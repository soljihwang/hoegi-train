<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>회기역 시간표</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap');

    :root {
      --bg: #1a1a2e;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --sub: rgba(240,240,240,0.55);
      --muted: rgba(240,240,240,0.30);
      --blue: #4f8ef7;
      --blue-glow: rgba(79,142,247,0.25);
      --mint: #3ecfb8;
      --mint-glow: rgba(62,207,184,0.25);
      --accent: #f7c94f;
      --soon: rgba(247,201,79,0.10);
      --soon-border: rgba(247,201,79,0.30);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(79,142,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(62,207,184,0.06) 0%, transparent 60%);
      padding: 20px 16px 40px;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* 헤더 */
    .header {
      margin-bottom: 28px;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .station-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .station-label span {
      color: var(--accent);
    }

    .clock-wrap {
      text-align: right;
      padding-top: 4px;
    }

    .clock {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }

    .date-label {
      font-size: 11px;
      color: var(--sub);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .direction-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
    }

    .direction-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* 섹션 타이틀 */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* 다음 열차 강조 */
    .next-train-section {
      margin-bottom: 28px;
    }

    .next-train-card {
      background: var(--surface);
      border: 1px solid var(--soon-border);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .next-train-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .next-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .next-main {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .next-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .next-badge.blue { background: var(--blue); box-shadow: 0 4px 16px var(--blue-glow); }
    .next-badge.mint { background: var(--mint); box-shadow: 0 4px 16px var(--mint-glow); }

    .next-info {
      flex: 1;
    }

    .next-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .next-dest {
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      margin-top: 2px;
    }

    .next-remaining {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-align: right;
      line-height: 1;
    }

    .next-remaining-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      margin-top: 2px;
    }

    /* 시간표 리스트 */
    .timetable-section {
      margin-bottom: 28px;
    }

    .timetable-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }

    .time-row.is-past {
      opacity: 0.35;
    }

    .time-row.is-soon {
      background: var(--soon);
      border-color: rgba(247,201,79,0.15);
    }

    .row-badge {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
    }

    .row-badge.blue { background: var(--blue); }
    .row-badge.mint { background: var(--mint); }

    .row-info {}

    .row-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .row-dest {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      margin-top: 1px;
    }

    .row-remaining {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .row-remaining.soon {
      color: var(--accent);
    }

    /* 탭 */
    .tab-wrap {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* 필터 */
    .filter-wrap {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .filter-btn {
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active.blue {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .filter-btn.active.mint {
      background: var(--mint);
      border-color: var(--mint);
      color: #fff;
    }

    .filter-btn.active.all {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    /* 새로고침 버튼 */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 0 14px;
      height: 32px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 20px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .refresh-icon {
      font-size: 14px;
    }

    /* 풋터 */
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* API 상태 표시 */
    .api-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      margin-bottom: 16px;
    }

    .api-status.ok { color: var(--mint); border-color: rgba(62,207,184,0.3); }
    .api-status.err { color: var(--accent); border-color: rgba(247,201,79,0.3); }
    .api-status.loading { color: var(--sub); }

    .api-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* 실시간 도착 */
    .realtime-section {
      margin-bottom: 28px;
    }

    .realtime-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .realtime-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .realtime-card.arriving {
      border-color: rgba(62,207,184,0.25);
      background: rgba(62,207,184,0.05);
    }

    .realtime-info {
      flex: 1;
      min-width: 0;
    }

    .realtime-dest {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .realtime-pos {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .realtime-eta {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: right;
      white-space: nowrap;
    }

    .realtime-eta.blue { color: var(--blue); }
    .realtime-eta.mint { color: var(--mint); }

    .realtime-eta-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      margin-top: 2px;
    }

    .realtime-updated {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
    }
  </style>
</head>

  </button>

      { badge: '1', time: '07:05', dest: '광운대' },
      { badge: '1', time: '21:44', dest: '광운대' },
      { badge: '중', time: '21:49', dest: '문산' },
      { badge: '1', time: '21:55', dest: '청량리' },
      { badge: '중', time: '22:02', dest: '덕소' }
    ],
    holiday: [
      { badge: '1', time: '05:30', dest: '청량리' },
      { badge: '중', time: '05:38', dest: '왕십리' },
      { badge: '1', time: '05:46', dest: '광운대' },
      { badge: '중', time: '05:54', dest: '덕소' },
      { badge: '1', time: '06:02', dest: '의정부' },
      { badge: '중', time: '06:10', dest: '문산' },
      { badge: '1', time: '06:18', dest: '청량리' },
      { badge: '중', time: '06:26', dest: '왕십리' },
      { badge: '1', time: '06:34', dest: '광운대' },
      { badge: '중', time: '06:42', dest: '덕소' },
      { badge: '1', time: '06:50', dest: '의정부' },
      { badge: '중', time: '06:58', dest: '문산' },
      { badge: '1', time: '07:06', dest: '청량리' },
      { badge: '중', time: '07:14', dest: '왕십리' },
      { badge: '1', time: '07:22', dest: '광운대' },
      { badge: '1', time: '21:46', dest: '청량리' },
      { badge: '중', time: '21:53', dest: '왕십리' },
      { badge: '1', time: '22:00', dest: '광운대' }
    ]
  };

  // ── 상태 ──────────────────────────────────────────────────────
  let currentTab = 'upcoming';
  let currentFilter = 'all';
  let liveData = null;  // API에서 받아온 데이터 (dayType별 캐시)
  let dataSource = 'static'; // 'api' | 'static'
  let realtimeData = null;
  let realtimeLastUpdated = null;

  // ── 유틸 ──────────────────────────────────────────────────────
  function getDayType() {
    const d = new Date().getDay();
    if (d === 0) return 'holiday';
    if (d === 6) return 'saturday';
    return 'weekday';
  }

  function parseMin(hm) {
    const [h, m] = hm.split(':').map(Number);
    return h * 60 + m;
  }

  function getNowMin() {
    const now = new Date();
    return now.getHours() * 60 + now.getMinutes();
  }

  function pad2(n) {
    return String(n).padStart(2, '0');
  }

  function badgeClass(badge) {
    return badge === '중' ? 'mint' : 'blue';
  }

  function remainingText(diffMin) {
    if (diffMin <= 0) return '출발';
    if (diffMin < 60) return `${diffMin}분 후`;
    const h = Math.floor(diffMin / 60);
    const m = diffMin % 60;
    return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
  }

  // ── 실시간 도착 API ───────────────────────────────────────────
  const SUBWAY_ID_MAP = { '1001': '1', '1063': '중' };

  function arvlCdToText(code) {
    switch (String(code)) {
      case '0': return '진입 중';
      case '1': return '도착';
      case '2': return '출발';
      case '3': return '전역 출발';
      case '4': return '전역 진입';
      case '5': return '전역 도착';
      default:  return '운행 중';
    }
  }

  async function fetchRealtimeArrivals() {
    if (!SEOUL_API_KEY || SEOUL_API_KEY === 'YOUR_SEOUL_API_KEY') {
      throw new Error('API_KEY_MISSING');
    }
    const station = encodeURIComponent('회기');
    const url = `${REALTIME_BASE}/${SEOUL_API_KEY}/json/realtimeStationArrival/0/20/${station}`;
    const res = await fetch(
      `https://hoegi-proxy.xlarge205.workers.dev?url=${encodeURIComponent(url)}`
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const result = json?.realtimeStationArrival?.RESULT;
    if (result?.code !== 'INFO-000') throw new Error(result?.message || '데이터 없음');
    const rows = json?.realtimeStationArrival?.row || [];
    console.log('[realtimeStationArrival] 전체 row 개수:', rows.length);
    if (rows.length > 0) {
      const uniqueStatnNm = [...new Set(rows.map(r => r.statnNm))].sort();
      console.log('[realtimeStationArrival] 고유 statnNm 목록:', uniqueStatnNm);
    }
    // 회기역, 청량리 방향 (updnLine === '0')
    // statnNm은 includes로 매칭 (공백/인코딩 차이 대비)
    return rows.filter(r =>
      (r.subwayId === '1001' || r.subwayId === '1063') &&
      r.statnNm && r.statnNm.includes('회기') &&
      String(r.updnLine) === '0'
    );
  }

  function setRealtimeStatus(state, msg) {
    const el  = document.getElementById('realtimeStatus');
    const txt = document.getElementById('realtimeStatusText');
    el.className = 'api-status ' + state;
    txt.textContent = msg;
  }

  function renderRealtime() {
    const list = document.getElementById('realtimeList');
    const upd  = document.getElementById('realtimeUpdated');

    if (!SEOUL_API_KEY || SEOUL_API_KEY === 'YOUR_SEOUL_API_KEY') {
      setRealtimeStatus('err', 'API 키 미설정');
      list.innerHTML = '<div class="empty" style="font-size:12px">index.html의 SEOUL_API_KEY를 설정하세요</div>';
      return;
    }

    if (!realtimeData) {
      list.innerHTML = '';
      return;
    }

    if (!realtimeData.length) {
      setRealtimeStatus('ok', '실시간 연동');
      list.innerHTML = '<div class="empty">현재 운행 정보 없음</div>';
      return;
    }

    setRealtimeStatus('ok', '실시간 연동');
    if (realtimeLastUpdated) {
      upd.textContent = `${pad2(realtimeLastUpdated.getHours())}:${pad2(realtimeLastUpdated.getMinutes())}:${pad2(realtimeLastUpdated.getSeconds())} 기준`;
    }

    list.innerHTML = realtimeData.map(train => {
      const badge  = SUBWAY_ID_MAP[train.subwayId] || '?';
      const cls    = badge === '중' ? 'mint' : 'blue';
      const eta    = parseInt(train.barvlDt, 10) || 0;
      const etaMin = Math.ceil(eta / 60);
      const etaTxt = eta <= 0 ? '곧 도착' : eta < 60 ? `${eta}″` : `${etaMin}분`;
      const isAriving = eta <= 30;
      const posMsg = train.arvlMsg3 || train.arvlMsg2 || arvlCdToText(train.arvlCd);

      return `
        <div class="realtime-card ${isAriving ? 'arriving' : ''}">
          <div class="row-badge ${cls}">${badge}</div>
          <div class="realtime-info">
            <div class="realtime-dest">${train.bstatnNm} 방면</div>
            <div class="realtime-pos">${posMsg}</div>
          </div>
          <div>
            <div class="realtime-eta ${cls}">${etaTxt}</div>
            <div class="realtime-eta-label">${eta <= 0 ? '' : '후 도착'}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function loadRealtime() {
    try {
      realtimeData = await fetchRealtimeArrivals();
      realtimeLastUpdated = new Date();
    } catch (e) {
      if (e.message !== 'API_KEY_MISSING') {
        setRealtimeStatus('err', '실시간 오류');
        console.warn('[실시간 API 오류]', e.message);
      }
      realtimeData = null;
    }
    renderRealtime();
  }

  // ── API 호출 ──────────────────────────────────────────────────
  function dayTypeToDayCd(dayType) {
    if (dayType === 'saturday') return '토요일';
    if (dayType === 'holiday')  return '휴일';
    return '평일';
  }

  function parseApiTime(str) {
    // API 반환 형식: "055500" → "05:55"  또는 "05:55:00" → "05:55"
    if (!str) return null;
    const s = str.replace(/:/g, '');
    if (s.length < 4) return null;
    return `${s.slice(0, 2)}:${s.slice(2, 4)}`;
  }

  async function fetchOneLine(cfg, weekTag) {
    const originalUrl = `${API_BASE}/1/500/N/${encodeURIComponent(cfg.inoutTag)}/${encodeURIComponent(weekTag)}/${encodeURIComponent(cfg.lineNm)}/${encodeURIComponent(cfg.stinNm)}`;
    console.log('[시간표 API] 요청 URL:', originalUrl);
    const res = await fetch(`${PROXY}?url=${encodeURIComponent(originalUrl)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rows = json?.getTrainSch?.row;
    if (!rows || !rows.length) return [];
    return rows.map(item => {
      const timeStr = item.LEFTTIME || item.ARRIVETIME || '';
      const time = parseApiTime(timeStr);
      if (!time) return null;
      return { badge: cfg.badge, time, dest: item.DEST_STIN_NM || '-' };
    }).filter(Boolean);
  }

  async function fetchAllLines(dayType) {
    const weekTag = dayTypeToDayCd(dayType);
    const results = await Promise.all(
      STATION_CONFIGS.map(cfg => fetchOneLine(cfg, weekTag))
    );
    return results.flat();
  }

  function setApiStatus(state, msg) {
    const el = document.getElementById('apiStatus');
    const txt = document.getElementById('apiStatusText');
    el.className = 'api-status ' + state;
    txt.textContent = msg;
  }

  async function loadFromAPI() {
    setApiStatus('loading', '시간표 불러오는 중...');
    try {
      const dayType = getDayType();
      const trains = await fetchAllLines(dayType);
      if (!trains.length) throw new Error('데이터 없음');
      liveData = trains;
      dataSource = 'api';
      setApiStatus('ok', 'API 연동 · 실시간 시간표');
    } catch (e) {
      dataSource = 'static';
      setApiStatus('err', '정적 데이터 사용 중 (API 오류)');
      console.warn('[API 오류]', e.message);
    }
    render();
  }

  // ── 시계 ──────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;

    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const dayType = getDayType();
    const dayTypeLabel = dayType === 'holiday' ? '공휴일' : dayType === 'saturday' ? '토요일' : '평일';
    document.getElementById('dateLabel').textContent =
      `${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]}) · ${dayTypeLabel}`;
  }

  // ── 다음 열차 렌더 ────────────────────────────────────────────
  function renderNextTrain(rows, nowMin) {
    const future = rows.filter(r => parseMin(r.time) >= nowMin);
    const card = document.getElementById('nextTrainCard');

    if (!future.length) {
      card.innerHTML = '<div class="empty">오늘 마지막 열차가 지났습니다</div>';
      return;
    }

    const next = future[0];
    const diffMin = parseMin(next.time) - nowMin;
    const cls = badgeClass(next.badge);

    card.innerHTML = `
      <div class="next-label">NEXT TRAIN</div>
      <div class="next-main">
        <div class="next-badge ${cls}">${next.badge}</div>
        <div class="next-info">
          <div class="next-time">${next.time}</div>
          <div class="next-dest">${next.dest} 방면</div>
        </div>
        <div>
          <div class="next-remaining">${diffMin <= 0 ? '출발' : diffMin + '분'}</div>
          <div class="next-remaining-label">${diffMin <= 0 ? '' : '후 출발'}</div>
        </div>
      </div>
    `;
  }

  // ── 시간표 리스트 렌더 ────────────────────────────────────────
  function renderList(rows, nowMin) {
    let filtered = rows;

    // 탭 필터
    if (currentTab === 'upcoming') {
      filtered = filtered.filter(r => parseMin(r.time) >= nowMin);
    }

    // 노선 필터
    if (currentFilter !== 'all') {
      filtered = filtered.filter(r => r.badge === currentFilter);
    }

    const list = document.getElementById('timetableList');

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">표시할 열차가 없습니다</div>';
      return;
    }

    const nowMinVal = nowMin;
    list.innerHTML = filtered.map((row, idx) => {
      const rowMin = parseMin(row.time);
      const diff = rowMin - nowMinVal;
      const isPast = diff < 0;
      const isSoon = diff >= 0 && diff <= 5;
      const cls = badgeClass(row.badge);
      const remText = isPast ? '지남' : remainingText(diff);
      const remCls = isSoon ? 'soon' : '';

      return `
        <div class="time-row ${isPast ? 'is-past' : ''} ${isSoon ? 'is-soon' : ''}">
          <div class="row-badge ${cls}">${row.badge}</div>
          <div class="row-info">
            <div class="row-time">${row.time}</div>
            <div class="row-dest">${row.dest} 방면</div>
          </div>
          <div class="row-remaining ${remCls}">${remText}</div>
        </div>
      `;
    }).join('');
  }

  // ── 탭/필터 ──────────────────────────────────────────────────
  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'blue', 'mint', 'all'));
    const btn = document.getElementById('filter-' + f);
    btn.classList.add('active');
    if (f === '1') btn.classList.add('blue');
    else if (f === '중') btn.classList.add('mint');
    else btn.classList.add('all');
    render();
  }

  // ── 메인 렌더 ────────────────────────────────────────────────
  function render() {
    const dayType = getDayType();
    const source = (dataSource === 'api' && liveData)
      ? liveData
      : (TIMETABLE[dayType] || []);
    const rows = source.slice().sort((a, b) => parseMin(a.time) - parseMin(b.time));
    const nowMin = getNowMin();

    renderNextTrain(rows, nowMin);
    renderList(rows, nowMin);
  }

  // ── 실시간 위치 API 테스트 ────────────────────────────────────
  async function testRealtimePosition() {
    const targetUrl = 'http://swopenAPI.seoul.go.kr/api/subway/76436747776f686935394e4e4a5244/json/realtimePosition/0/200/1호선?dataType=JSON';
    const proxyUrl = `https://hoegi-proxy.xlarge205.workers.dev?url=${encodeURIComponent(targetUrl)}`;

    console.log('[realtimePosition] 요청 시작');
    console.log('[realtimePosition] target URL (dataType=JSON 포함):', targetUrl);
    console.log('[realtimePosition] 프록시 URL:', proxyUrl);

    try {
      const res = await fetch(proxyUrl);
      console.log('[realtimePosition] HTTP 상태:', res.status, res.statusText);

      const text = await res.text();
      console.log('[realtimePosition] 원본 응답 텍스트:', text);

      try {
        const json = JSON.parse(text);
        console.log('[realtimePosition] JSON 파싱 성공 - 최상위 키:', Object.keys(json));
        const rows = json?.realtimePositionList?.row || json?.row || [];
        console.log('[realtimePosition] row 개수:', rows.length);
        if (rows.length > 0) {
          console.log('[realtimePosition] 첫 번째 row 키:', Object.keys(rows[0]));
          console.log('[realtimePosition] 전체 statnNm 목록:', rows.map(r => r.statnNm));
          const uniqueStatnNm = [...new Set(rows.map(r => r.statnNm))].sort();
          console.log('[realtimePosition] 고유 statnNm (정렬):', uniqueStatnNm);
          const hoegi = rows.filter(r => r.statnNm && r.statnNm.includes('회기'));
          console.log('[realtimePosition] "회기" 포함 row:', hoegi);
        } else {
          // row가 없으면 JSON 전체 구조 출력
          console.log('[realtimePosition] row 없음 - JSON 전체:', JSON.stringify(json).slice(0, 2000));
        }
      } catch (parseErr) {
        console.warn('[realtimePosition] JSON 파싱 실패:', parseErr.message);
      }
    } catch (err) {
      console.error('[realtimePosition] fetch 실패:', err);
    }
  }

  testRealtimePosition();

  // ── 초기화 ───────────────────────────────────────────────────
  updateClock();
  render();
  loadFromAPI();
  setInterval(() => { updateClock(); render(); }, 30000);
  // 매 10분마다 API 재조회
  setInterval(loadFromAPI, 10 * 60 * 1000);
</script>
