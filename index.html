<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>회기역 시간표</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap');

    :root {
      --bg: #1a1a2e;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --sub: rgba(240,240,240,0.55);
      --muted: rgba(240,240,240,0.30);
      --blue: #4f8ef7;
      --blue-glow: rgba(79,142,247,0.25);
      --mint: #3ecfb8;
      --mint-glow: rgba(62,207,184,0.25);
      --accent: #f7c94f;
      --soon: rgba(247,201,79,0.10);
      --soon-border: rgba(247,201,79,0.30);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(79,142,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(62,207,184,0.06) 0%, transparent 60%);
      padding: 20px 16px 40px;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* 헤더 */
    .header {
      margin-bottom: 28px;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .station-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .station-label span {
      color: var(--accent);
    }

    .clock-wrap {
      text-align: right;
      padding-top: 4px;
    }

    .clock {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }

    .date-label {
      font-size: 11px;
      color: var(--sub);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .direction-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
    }

    .direction-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* 섹션 타이틀 */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* 다음 열차 강조 */
    .next-train-section {
      margin-bottom: 28px;
    }

    .next-train-card {
      background: var(--surface);
      border: 1px solid var(--soon-border);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .next-train-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .next-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .next-main {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .next-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .next-badge.blue { background: var(--blue); box-shadow: 0 4px 16px var(--blue-glow); }
    .next-badge.mint { background: var(--mint); box-shadow: 0 4px 16px var(--mint-glow); }

    .next-info {
      flex: 1;
    }

    .next-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .next-dest {
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      margin-top: 2px;
    }

    .next-remaining {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-align: right;
      line-height: 1;
    }

    .next-remaining-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      margin-top: 2px;
    }

    /* 시간표 리스트 */
    .timetable-section {
      margin-bottom: 28px;
    }

    .timetable-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }

    .time-row.is-past {
      opacity: 0.35;
    }

    .time-row.is-soon {
      background: var(--soon);
      border-color: rgba(247,201,79,0.15);
    }

    .row-badge {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
    }

    .row-badge.blue { background: var(--blue); }
    .row-badge.mint { background: var(--mint); }

    .row-info {}

    .row-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .row-dest {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      margin-top: 1px;
    }

    .row-remaining {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .row-remaining.soon {
      color: var(--accent);
    }

    /* 탭 */
    .tab-wrap {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* 필터 */
    .filter-wrap {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .filter-btn {
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active.blue {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .filter-btn.active.mint {
      background: var(--mint);
      border-color: var(--mint);
      color: #fff;
    }

    .filter-btn.active.all {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    /* 새로고침 버튼 */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 0 14px;
      height: 32px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 20px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .refresh-icon {
      font-size: 14px;
    }

    /* 풋터 */
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.05em;
    }
  </style>
</head>

</div>

  let currentTab = 'upcoming';

  // ── 유틸 ──────────────────────────────────────────────────────
  function getDayType() {
    const d = new Date().getDay();
    if (d === 0) return 'holiday';
    if (d === 6) return 'saturday';
    return 'weekday';
  }

  function parseMin(hm) {
    const [h, m] = hm.split(':').map(Number);
    return h * 60 + m;
  }

  function getNowMin() {
    const now = new Date();
    return now.getHours() * 60 + now.getMinutes();
  }

  function pad2(n) {
    return String(n).padStart(2, '0');
  }

  function badgeClass(badge) {
    return badge === '중' ? 'mint' : 'blue';
  }

  function remainingText(diffMin) {
    if (diffMin <= 0) return '출발';
    if (diffMin < 60) return `${diffMin}분 후`;
    const h = Math.floor(diffMin / 60);
    const m = diffMin % 60;
    return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
  }

  // ── 시계 ──────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;

    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const dayType = getDayType();
    const dayTypeLabel = dayType === 'holiday' ? '공휴일' : dayType === 'saturday' ? '토요일' : '평일';
    document.getElementById('dateLabel').textContent =
      `${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]}) · ${dayTypeLabel}`;
  }

      card.innerHTML = '<div class="empty">오늘 마지막 열차가 지났습니다</div>';

    }

    const diffMin = parseMin(next.time) - nowMin;

          <div class="next-time">${next.time}</div>
          <div class="next-dest">${next.dest} 방면</div>
        </div>
        <div>
          <div class="next-remaining">${diffMin <= 0 ? '출발' : diffMin + '분'}</div>
          <div class="next-remaining-label">${diffMin <= 0 ? '' : '후 출발'}</div>
        </div>
      </div>
    `;
  }

  // ── 시간표 리스트 렌더 ────────────────────────────────────────
  function renderList(rows, nowMin) {
    let filtered = rows;

    // 탭 필터
    if (currentTab === 'upcoming') {
      filtered = filtered.filter(r => parseMin(r.time) >= nowMin);
    }

    // 노선 필터
    if (currentFilter !== 'all') {
      filtered = filtered.filter(r => r.badge === currentFilter);
    }

    const list = document.getElementById('timetableList');

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">표시할 열차가 없습니다</div>';
      return;
    }

    const nowMinVal = nowMin;
    list.innerHTML = filtered.map((row, idx) => {
      const rowMin = parseMin(row.time);
      const diff = rowMin - nowMinVal;
      const isPast = diff < 0;
      const isSoon = diff >= 0 && diff <= 5;
      const cls = badgeClass(row.badge);
      const remText = isPast ? '지남' : remainingText(diff);
      const remCls = isSoon ? 'soon' : '';

      return `
        <div class="time-row ${isPast ? 'is-past' : ''} ${isSoon ? 'is-soon' : ''}">
          <div class="row-badge ${cls}">${row.badge}</div>
          <div class="row-info">
            <div class="row-time">${row.time}</div>
            <div class="row-dest">${row.dest} 방면</div>
          </div>
          <div class="row-remaining ${remCls}">${remText}</div>
        </div>
      `;
    }).join('');
  }

  // ── 탭/필터 ──────────────────────────────────────────────────
  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'blue', 'mint', 'all'));
    const btn = document.getElementById('filter-' + f);
    btn.classList.add('active');
    if (f === '1') btn.classList.add('blue');
    else if (f === '중') btn.classList.add('mint');
    else btn.classList.add('all');
    render();
  }

  // ── 메인 렌더 ────────────────────────────────────────────────
  function render() {
    const dayType = getDayType();
    const rows = (TIMETABLE[dayType] || [])
      .slice()
      .sort((a, b) => parseMin(a.time) - parseMin(b.time));
    const nowMin = getNowMin();

    renderNextTrain(rows, nowMin);
    renderList(rows, nowMin);
  }

  // ── 초기화 ───────────────────────────────────────────────────
  updateClock();
  render();
  setInterval(() => { updateClock(); render(); }, 30000);
</script>
</body>
</html>
